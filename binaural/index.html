<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>Binaural Tones</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #f1f5f9;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .app {
    width: 100%;
    max-width: 420px;
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 14px;
    color: #cbd5e1;
  }
  .channels {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .channel {
    flex: 1;
  }
  .channel label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #94a3b8;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .channel.left label { color: #a5b4fc; }
  .channel.right label { color: #f9a8d4; }
  .input-row {
    position: relative;
  }
  input[type="number"] {
    width: 100%;
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 10px;
    padding: 10px 32px 10px 12px;
    color: #f1f5f9;
    font-size: 16px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    -moz-appearance: textfield;
  }
  input[type="number"]:focus { border-color: #6366f1; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .unit {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: #64748b;
    font-size: 12px;
    pointer-events: none;
  }
  .buttons {
    display: flex;
    gap: 8px;
  }
  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    color: white;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #startBtn { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  #stopBtn { background: linear-gradient(135deg, #ef4444, #f43f5e); }
  .status {
    text-align: center;
    margin-top: 10px;
    font-size: 11px;
    color: #64748b;
    height: 14px;
  }
  .status.playing { color: #4ade80; }
  .status.playing::before {
    content: "● ";
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="app">
    <h1>Binaural Tones</h1>

    <div class="channels">
      <div class="channel left">
        <label>Left</label>
        <div class="input-row">
          <input type="number" id="leftFreq" value="220" min="20" max="20000" step="1">
          <span class="unit">Hz</span>
        </div>
      </div>
      <div class="channel right">
        <label>Right</label>
        <div class="input-row">
          <input type="number" id="rightFreq" value="224" min="20" max="20000" step="1">
          <span class="unit">Hz</span>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>

    <div class="status" id="status">Stopped</div>
  </div>

<script>
let audioCtx = null;
let leftOsc = null, rightOsc = null;
let leftGain = null, rightGain = null;
let isPlaying = false;

const leftFreq = document.getElementById('leftFreq');
const rightFreq = document.getElementById('rightFreq');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const status = document.getElementById('status');

function clampFreq(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return 440;
  return Math.max(20, Math.min(20000, n));
}

leftFreq.addEventListener('input', () => {
  if (leftOsc && audioCtx) {
    leftOsc.frequency.setTargetAtTime(clampFreq(leftFreq.value), audioCtx.currentTime, 0.01);
  }
});
rightFreq.addEventListener('input', () => {
  if (rightOsc && audioCtx) {
    rightOsc.frequency.setTargetAtTime(clampFreq(rightFreq.value), audioCtx.currentTime, 0.01);
  }
});

async function start() {
  if (isPlaying) return;
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const lFreq = clampFreq(leftFreq.value);
  const rFreq = clampFreq(rightFreq.value);

  const merger = audioCtx.createChannelMerger(2);

  leftOsc = audioCtx.createOscillator();
  leftOsc.type = 'sine';
  leftOsc.frequency.value = lFreq;
  leftGain = audioCtx.createGain();
  leftGain.gain.value = 0;
  leftOsc.connect(leftGain).connect(merger, 0, 0);

  rightOsc = audioCtx.createOscillator();
  rightOsc.type = 'sine';
  rightOsc.frequency.value = rFreq;
  rightGain = audioCtx.createGain();
  rightGain.gain.value = 0;
  rightOsc.connect(rightGain).connect(merger, 0, 1);

  merger.connect(audioCtx.destination);

  const now = audioCtx.currentTime;
  leftGain.gain.linearRampToValueAtTime(0.25, now + 0.05);
  rightGain.gain.linearRampToValueAtTime(0.25, now + 0.05);

  leftOsc.start();
  rightOsc.start();

  isPlaying = true;
  startBtn.disabled = true;
  stopBtn.disabled = false;
  status.textContent = 'Playing';
  status.classList.add('playing');
}

function stop() {
  if (!isPlaying || !audioCtx) return;
  const now = audioCtx.currentTime;
  leftGain.gain.cancelScheduledValues(now);
  rightGain.gain.cancelScheduledValues(now);
  leftGain.gain.setValueAtTime(leftGain.gain.value, now);
  rightGain.gain.setValueAtTime(rightGain.gain.value, now);
  leftGain.gain.linearRampToValueAtTime(0, now + 0.05);
  rightGain.gain.linearRampToValueAtTime(0, now + 0.05);
  leftOsc.stop(now + 0.06);
  rightOsc.stop(now + 0.06);
  leftOsc = rightOsc = leftGain = rightGain = null;
  isPlaying = false;
  startBtn.disabled = false;
  stopBtn.disabled = true;
  status.textContent = 'Stopped';
  status.classList.remove('playing');
}

startBtn.addEventListener('click', start);
stopBtn.addEventListener('click', stop);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
