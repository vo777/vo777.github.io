<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>Binaural Tones</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #f1f5f9;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    width: 100%;
    max-width: 420px;
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: #94a3b8;
    font-size: 13px;
    margin-bottom: 24px;
  }
  .channel {
    margin-bottom: 18px;
  }
  .channel label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: #cbd5e1;
    margin-bottom: 8px;
  }
  .badge {
    background: rgba(99, 102, 241, 0.2);
    color: #a5b4fc;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .badge.right { background: rgba(244, 114, 182, 0.2); color: #f9a8d4; }
  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  input[type="number"] {
    flex: 1;
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 12px;
    padding: 14px 16px;
    color: #f1f5f9;
    font-size: 18px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    -moz-appearance: textfield;
  }
  input[type="number"]:focus {
    border-color: #6366f1;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .unit {
    color: #64748b;
    font-size: 14px;
    width: 30px;
  }
  input[type="range"] {
    width: 100%;
    margin-top: 10px;
    accent-color: #6366f1;
  }
  .buttons {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }
  button {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    color: white;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #startBtn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
  }
  #stopBtn {
    background: linear-gradient(135deg, #ef4444, #f43f5e);
  }
  .status {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: #64748b;
    height: 18px;
  }
  .status.playing { color: #4ade80; }
  .status.playing::before {
    content: "● ";
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .hint {
    margin-top: 14px;
    font-size: 11px;
    color: #475569;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="app">
    <h1>Binaural Tones</h1>
    <p class="subtitle">Two ears, two frequencies</p>

    <div class="channel">
      <label>Left Ear <span class="badge">L</span></label>
      <div class="input-row">
        <input type="number" id="leftFreq" value="220" min="20" max="20000" step="1">
        <span class="unit">Hz</span>
      </div>
      <input type="range" id="leftSlider" value="220" min="20" max="2000" step="1">
    </div>

    <div class="channel">
      <label>Right Ear <span class="badge right">R</span></label>
      <div class="input-row">
        <input type="number" id="rightFreq" value="224" min="20" max="20000" step="1">
        <span class="unit">Hz</span>
      </div>
      <input type="range" id="rightSlider" value="224" min="20" max="2000" step="1">
    </div>

    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>

    <div class="status" id="status">Stopped</div>
    <p class="hint">Use headphones for proper stereo separation.</p>
  </div>

<script>
let audioCtx = null;
let leftOsc = null, rightOsc = null;
let leftGain = null, rightGain = null;
let isPlaying = false;

const leftFreq = document.getElementById('leftFreq');
const rightFreq = document.getElementById('rightFreq');
const leftSlider = document.getElementById('leftSlider');
const rightSlider = document.getElementById('rightSlider');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const status = document.getElementById('status');

function clampFreq(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return 440;
  return Math.max(20, Math.min(20000, n));
}

function syncInputs(source, target, slider1, slider2) {
  // Keep number input and slider in sync
}

// Sync number ↔ slider for left
leftFreq.addEventListener('input', () => {
  const v = clampFreq(leftFreq.value);
  if (v <= 2000) leftSlider.value = v;
  updateLeftFreq(v);
});
leftSlider.addEventListener('input', () => {
  leftFreq.value = leftSlider.value;
  updateLeftFreq(parseFloat(leftSlider.value));
});

rightFreq.addEventListener('input', () => {
  const v = clampFreq(rightFreq.value);
  if (v <= 2000) rightSlider.value = v;
  updateRightFreq(v);
});
rightSlider.addEventListener('input', () => {
  rightFreq.value = rightSlider.value;
  updateRightFreq(parseFloat(rightSlider.value));
});

function updateLeftFreq(v) {
  if (leftOsc && audioCtx) {
    leftOsc.frequency.setTargetAtTime(v, audioCtx.currentTime, 0.01);
  }
}
function updateRightFreq(v) {
  if (rightOsc && audioCtx) {
    rightOsc.frequency.setTargetAtTime(v, audioCtx.currentTime, 0.01);
  }
}

async function start() {
  if (isPlaying) return;
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }

  const lFreq = clampFreq(leftFreq.value);
  const rFreq = clampFreq(rightFreq.value);

  // Stereo merger to route each oscillator to a single channel
  const merger = audioCtx.createChannelMerger(2);

  leftOsc = audioCtx.createOscillator();
  leftOsc.type = 'sine';
  leftOsc.frequency.value = lFreq;
  leftGain = audioCtx.createGain();
  leftGain.gain.value = 0;
  leftOsc.connect(leftGain).connect(merger, 0, 0); // channel 0 = left

  rightOsc = audioCtx.createOscillator();
  rightOsc.type = 'sine';
  rightOsc.frequency.value = rFreq;
  rightGain = audioCtx.createGain();
  rightGain.gain.value = 0;
  rightOsc.connect(rightGain).connect(merger, 0, 1); // channel 1 = right

  merger.connect(audioCtx.destination);

  const now = audioCtx.currentTime;
  // Smooth fade-in to avoid pops
  leftGain.gain.linearRampToValueAtTime(0.25, now + 0.05);
  rightGain.gain.linearRampToValueAtTime(0.25, now + 0.05);

  leftOsc.start();
  rightOsc.start();

  isPlaying = true;
  startBtn.disabled = true;
  stopBtn.disabled = false;
  status.textContent = 'Playing';
  status.classList.add('playing');
}

function stop() {
  if (!isPlaying || !audioCtx) return;
  const now = audioCtx.currentTime;

  // Fade out to avoid pops, then stop
  leftGain.gain.cancelScheduledValues(now);
  rightGain.gain.cancelScheduledValues(now);
  leftGain.gain.setValueAtTime(leftGain.gain.value, now);
  rightGain.gain.setValueAtTime(rightGain.gain.value, now);
  leftGain.gain.linearRampToValueAtTime(0, now + 0.05);
  rightGain.gain.linearRampToValueAtTime(0, now + 0.05);

  leftOsc.stop(now + 0.06);
  rightOsc.stop(now + 0.06);

  leftOsc = rightOsc = leftGain = rightGain = null;
  isPlaying = false;
  startBtn.disabled = false;
  stopBtn.disabled = true;
  status.textContent = 'Stopped';
  status.classList.remove('playing');
}

startBtn.addEventListener('click', start);
stopBtn.addEventListener('click', stop);

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
